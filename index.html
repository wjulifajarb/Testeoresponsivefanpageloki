<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!-- Hace que el diseño se adapte al ancho real del dispositivo -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Responsive</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Contenedor principal -->
  <section class="contenedor">
    
    <!-- Card -->
    <div class="card">
      <!-- Imagen de la card -->
      <img src="img/Loki.webp" alt="Imagen de ejemplo" class="card-img">

      <!-- Contenido de texto -->
      <div class="card-content">
        <h2>Curso de HTML y CSS</h2>
        <p>
          Aprende a crear páginas web bonitas, ordenadas y adaptables
          a celular, tablet y computador.
        </p>
        <button>Ver más</button>
      </div>
    </div>

  </section>

</body>
</html>
